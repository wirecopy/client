name: Client CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  cli:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["20", "24"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm pack --dry-run

  macos:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Toolchain
        run: swift --version
      - name: Unit tests
        working-directory: macos
        run: swift test
      - name: Universal development bundle
        working-directory: macos
        run: ./scripts/build-app
      - name: Verify bundle
        working-directory: macos
        run: |
          codesign --verify --deep --strict dist/Wirecopy.app
          test "$(lipo -archs dist/Wirecopy.app/Contents/MacOS/WirecopyApp)" = "x86_64 arm64"
          test ! -e dist/Wirecopy.app/Contents/MacOS/wirecopy
          plutil -lint dist/Wirecopy.app/Contents/Info.plist
      - name: Validate contract and Cask syntax
        run: |
          ruby -e 'require "yaml"; YAML.safe_load(File.read("contracts/managed-api-v1.yaml"), aliases: true)'
          ruby -c macos/Casks/wirecopy.rb.template
